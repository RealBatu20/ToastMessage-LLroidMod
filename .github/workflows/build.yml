name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      abi:
        description: "Target ABI"
        default: "arm64-v8a"
        type: choice
        options: ["arm64-v8a", "armeabi-v7a", "all"]
      release_tag:
        description: "If set (e.g. v0.1.0), create this tag and publish a release with the built .levipack"
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a]
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28
          # local-cache disabled: the cached NDK tree is restored incomplete on
          # this runner (clang++ missing), so every cache-restored run failed at
          # configure. Force a fresh, complete NDK install each run.
          local-cache: false

      - name: Verify NDK toolchain
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          CLANGXX="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++"
          if [ ! -x "$CLANGXX" ]; then
            echo "::error::NDK clang++ not found or not executable at $CLANGXX"
            exit 1
          fi
          "$CLANGXX" --version

      - name: Build and package
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_PLATFORM: android-28
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh ${{ matrix.abi }}

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp build-${{ matrix.abi }}/*.levipack dist/ || true
          cp build-${{ matrix.abi }}/lib*.so dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toast-message-${{ matrix.abi }}
          path: dist/

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          name: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          files: dist/*.levipack
